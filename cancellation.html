<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cancellation Policy | Anidev</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="site-header"></div>
  <section class="legal-page"><div class="container" id="legal-content"></div></section>
  <div id="site-footer"></div>
  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
  <script>
    renderLegalPage('Cancellation Policy', `
      <p>Last updated: ${new Date().getFullYear()}</p>
      <p>This Cancellation Policy applies to orders placed on Anidev operated by <strong>Anidev</strong>.</p>
      <h2>1. Order Cancellation by Customer</h2>
      <ul>
        <li>Orders may be cancelled before dispatch by calling +91 8447559220 or emailing support@anidevmultitrading.in with your order ID.</li>
        <li>Once the order is out for delivery, cancellation may not be possible.</li>
        <li>For online-paid orders cancelled before dispatch, a full refund will be issued within 5–7 business days.</li>
        <li>For COD orders cancelled before dispatch, no charges apply.</li>
      </ul>
      <h2>2. Cancellation by Anidev</h2>
      <p>We may cancel orders due to stock unavailability, delivery area restrictions or operational issues. You will receive a full refund for prepaid orders.</p>
      <h2>3. Partial Cancellation</h2>
      <p>If specific items are unavailable, we may partially fulfil your order and refund the unavailable items, or cancel the entire order at your preference.</p>
      <h2>4. No-Show / Refused Delivery</h2>
      <p>If you are unavailable at the delivery address after reasonable attempts, the order may be cancelled. COD orders will not be re-delivered. Prepaid orders may incur a redelivery fee.</p>
      <h2>5. Contact</h2>
      <p>+91 8447559220 | support@anidevmultitrading.in<br>Anidev Multitrading Pvt Ltd, Office no 616, SL Tower, Commercial Belt Alpha 1, Greater Noida, Gautam Buddha Nagar, UP 201310</p>
    `);
  </script>
</body>
</html>
