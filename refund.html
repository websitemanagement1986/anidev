<body>
  <div id="site-header"></div>
  <section class="legal-page"><div class="container" id="legal-content"></div></section>
  <div id="site-footer"></div>
  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
  <script>
    renderLegalPage('Refund Policy', `
      <p>Last updated: ${new Date().getFullYear()}</p>
      <p>At <strong>Anidev</strong>, customer satisfaction is our priority. This Refund Policy applies to all orders placed on Anidev.</p>
      <h2>1. Eligible Refunds</h2>
      <ul>
        <li>Damaged, spoiled or incorrect items received</li>
        <li>Missing items from your order</li>
        <li>Significantly below-quality perishable produce</li>
        <li>Online payment charged but order not confirmed</li>
      </ul>
      <h2>2. How to Request a Refund</h2>
      <p>Contact us within <strong>24 hours</strong> of delivery with your order ID and photos of the issue. Reach Neeraj Kumar at +91 8796065003 or support@anidev.in.</p>
      <h2>3. Refund Process</h2>
      <ul>
        <li><strong>Online payments:</strong> Refunds are processed to the original payment method within 5–7 business days via Razorpay.</li>
        <li><strong>COD orders:</strong> Refunds are issued as account credit or bank transfer after verification.</li>
        <li><strong>Replacement:</strong> We may offer a free replacement instead of a refund where possible.</li>
      </ul>
      <h2>4. Non-Refundable Items</h2>
      <p>Opened packaged goods, items reported after 24 hours, and products damaged due to improper storage after delivery are not eligible for refund.</p>
      <h2>5. Contact</h2>
      <p>Anidev, Unit no 527, P5/B Block, NPX Tower, Sec-153, Noida, Gautam Buddha Nagar, UP 201301.</p>
    `);
  </script>
